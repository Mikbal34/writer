# Fly.io app config for the python-service sidecar: PDF extraction
# (pdfjs/Tesseract/route to Modal Surya for hard scripts) + BGE-M3
# embedding (sentence-transformers, CPU). The Node worker calls this
# over Fly's internal 6PN mesh as PYTHON_SERVICE_URL.
#
# Secrets:
#   SURYA_OCR_SECRET   (forwarded to the Modal OCR app)
# No DB / queue secrets here — this service is stateless.

app = "quilpen-python"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  # Modal Surya OCR endpoint — set as a secret if it ever rotates.
  PORT = "8000"

[http_service]
  internal_port = 8000
  # Internal-only by default (the Node worker reaches it via 6PN). If
  # you ever want public access, expose by adding [[services.ports]].
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

# performance-2x = 2 vCPU + 8 GB. RAM math (per machine):
# 2 OCR procs × 400 MB (CORE 8-lang) + BGE-M3 1.5 GB + base ~1 GB
# = ~3 GB working set on 8 GB, comfortable headroom. Old 30-lang
# Tesseract was the OOM trigger; CORE 8-lang fix lets us run on the
# smaller box without risk. Bump back to performance-4x if real-world
# multi-concurrent uploads ever surface memory pressure again.
[[vm]]
  size = "performance-2x"
  memory = "8gb"

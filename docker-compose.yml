services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: writer_agent_db
    environment:
      POSTGRES_USER: writer
      POSTGRES_PASSWORD: writer_dev_2024
      POSTGRES_DB: writer_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U writer -d writer_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
